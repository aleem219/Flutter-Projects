plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "co.appbrewery.micard"
    compileSdk 34

    defaultConfig {
        applicationId "co.appbrewery.micard"
        minSdk flutter.minSdkVersion
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}